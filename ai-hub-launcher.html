<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(88,101,242,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 50px;
    }
    .grid {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      width: 160px;
      height: 180px;
      background: #16161a;
      border: 1px solid #222228;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #333;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .card:active {
      transform: translateY(-2px);
    }
    .card.chatgpt:hover { border-color: #10a37f; box-shadow: 0 12px 40px rgba(16,163,127,0.15); }
    .card.gemini:hover { border-color: #ea4335; box-shadow: 0 12px 40px rgba(234,67,53,0.15); }
    .card.claude:hover { border-color: #d4a574; box-shadow: 0 12px 40px rgba(212,165,116,0.15); }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
    }
    .card.chatgpt .icon { background: linear-gradient(135deg, #10a37f, #0f766e); }
    .card.gemini .icon { background: linear-gradient(135deg, #ea4335, #c5221f); }
    .card.claude .icon { background: linear-gradient(135deg, #d4a574, #b8956e); }
    .name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    .desc {
      font-size: 11px;
      color: #666;
    }
    .footer {
      position: fixed;
      bottom: 20px;
      color: #444;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <h1>AI Hub</h1>
    <p>Your AI assistants in one place</p>
    <div class="grid">
      <a class="card chatgpt" onclick="navigate('https://chatgpt.com/')">
        <div class="icon">🤖</div>
        <div class="name">ChatGPT</div>
        <div class="desc">OpenAI's AI</div>
      </a>
      <a class="card gemini" onclick="navigate('https://gemini.google.com/')">
        <div class="icon">💎</div>
        <div class="name">Gemini</div>
        <div class="desc">Google's AI</div>
      </a>
      <a class="card claude" onclick="navigate('https://claude.ai/')">
        <div class="icon">🧠</div>
        <div class="name">Claude</div>
        <div class="desc">Anthropic's AI</div>
      </a>
    </div>
  </div>
  <div class="footer">Click an AI to start • Use Ctrl+Z for zoom controls</div>
  <script>
    function navigate(url) {
      window.location.href = url;
    }
  </script>
</body>
</html>
