name: Build AI Hub App

on:
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

jobs:
  build:
    name: AI Hub (${{ matrix.build }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: stable
          - build: windows
            os: windows-latest
            rust: stable-x86_64-msvc
          - build: macos
            os: macos-latest
            rust: stable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 20
        run: |
          node dist/cli.js launcher/index.html --name AI-Hub --use-local-file --width 900 --height 700 --zoom 100 --targets deb,appimage
          mkdir -p output/linux
          [ -f "AI-Hub.deb" ] && mv "AI-Hub.deb" output/linux/AI-Hub_`arch`.deb
          [ -f "AI-Hub.AppImage" ] && mv "AI-Hub.AppImage" output/linux/AI-Hub_`arch`.AppImage

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        timeout-minutes: 25
        env:
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        run: |
          node dist/cli.js launcher/index.html --name AI-Hub --use-local-file --hide-title-bar --width 900 --height 700 --zoom 100 --targets universal --multi-arch
          mkdir -p output/macos
          [ -f "AI-Hub.dmg" ] && mv "AI-Hub.dmg" output/macos/AI-Hub.dmg

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        timeout-minutes: 20
        run: |
          node dist/cli.js launcher/index.html --name AI-Hub --use-local-file --width 900 --height 700 --zoom 100 --targets x64
          New-Item -Path output\windows -ItemType Directory -Force
          if (Test-Path "AI-Hub.msi") {
            Move-Item -Path "AI-Hub.msi" -Destination "output\windows\AI-Hub_x64.msi"
          }
          git checkout -- src-tauri/Cargo.lock

      - name: Upload artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: AI-Hub-${{ matrix.build }}
          path: output/*/*.*
          retention-days: 3